body:
  text: 天保八年歲次丁丑三月庚子廿二日辛酉法儀兄弟八十人等故仰囑慈雲希心洪澤府練財命知有浮死之速藉今現在各減家珍詳建妙塔一軀上為皇永隆邊方寧太又願居眷三有之徒咸同此福法仙寶高樹淳于思孫道慈郭良生牟仙陳寶趙羅剎侯眾牟光淳于國孔神洛生牟見祖淳于興劉賓陰始那陰思達孔詳夏侯珇淳于猛那牟豊牟本孫万年王市那孔王子王祖興劉葙孔景維那陰由元伯丁族陰小維那牟照明牟袁王秋孫曇度劉遷刑道元張景達孔惠可淳于周淳于躭矯念牟槙興逢懟牟視犢牟仙供養陰牟寄興陰牟苗孔平天保八年郭猛造像一摳崇伯陰永陰樹陰路牟六陰叉陰景洪孔王子供養時鄧戀矢岑陵王張照堂劉勝王王銀珠張妍陰神洛仙姜王閏妃逢妙孔女伾陰子洪牟信陰愁羊蒲堂塔主牟光英妙塔內置聖容流光綴彩影眺三空顒哲士敬法詵悁財非寶崇福為珍施石人劉永固
